name: Build Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          # macOS Intel
          - os: macos-15-intel
            platform: darwin
            arch: x64
            artifact_name: macos-intel
          # macOS ARM (Apple Silicon)
          - os: macos-15
            platform: darwin
            arch: arm64
            artifact_name: macos-arm64
          # Windows
          - os: windows-latest
            platform: win32
            arch: x64
            artifact_name: windows
          # Linux
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact_name: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22.12.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite application
        run: npm run build

      - name: Package web dist for release
        if: matrix.platform == 'linux'
        run: zip -r dist.zip dist
      - name: Upload dist artifact
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist.zip
          retention-days: 5

      - name: Build Electron app
        run: npm run make -- --arch=${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # macOS: Upload DMG and ZIP
      - name: Upload macOS artifacts
        if: matrix.platform == 'darwin'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            out/make/**/*.dmg
            out/make/zip/**/*.zip
          retention-days: 5

      # Windows: Upload Squirrel installer and ZIP
      - name: Upload Windows artifacts
        if: matrix.platform == 'win32'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            out/make/squirrel.windows/x64/*.exe
            out/make/squirrel.windows/x64/*.nupkg
            out/make/zip/win32/x64/*.zip
          retention-days: 5

      # Linux: Upload DEB, RPM and ZIP
      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            out/make/deb/x64/*.deb
            out/make/rpm/x64/*.rpm
            out/make/zip/linux/x64/*.zip
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Build release notes from changelog
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          changelog_file="CHANGELOG.md"
          changelog_section="release-changelog.md"
          release_notes="release-notes.md"

          if ! awk -v target="$version" '
            function trim(value) {
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", value)
              return value
            }
            /^##[[:space:]]+/ {
              heading = $0
              sub(/^##[[:space:]]+/, "", heading)
              heading = trim(heading)
              if (capture) exit
              if (heading == target || heading == "v" target) {
                capture = 1
                found = 1
                next
              }
            }
            capture { print }
            END { if (!found) exit 1 }
          ' "$changelog_file" > "$changelog_section"; then
            echo "::warning::No changelog section found for ${version}; using latest changelog section."
            awk '
              /^##[[:space:]]+/ {
                if (capture) exit
                capture = 1
                found = 1
                next
              }
              capture { print }
              END { if (!found) exit 1 }
            ' "$changelog_file" > "$changelog_section"
          fi

          {
            cat <<EOF
          ## ESPConnect ${GITHUB_REF_NAME}

          Browser-based control center for ESP32 and ESP8266 boards - now as a standalone desktop application.

          ### Changes

          EOF
            cat "$changelog_section"
            cat <<EOF

          ### Downloads

          | Platform | Architecture | File Type | Notes |
          |----------|--------------|-----------|-------|
          | macOS | Apple Silicon (M1/M2/M3) | \`.dmg\` | macOS 11+ |
          | macOS | Intel | \`.dmg\` | macOS 10.13+ |
          | Windows | x64 | \`.exe\` installer | Windows 10+ |
          | Linux | x64 | \`.deb\` / \`.rpm\` | Ubuntu, Debian, Fedora, etc. |
          | Web UI | Any | \`.zip\` | Static \`dist/\` build for custom hosting |

          ### Installation

          **macOS Apple Silicon:**
          \`\`\`bash
          curl -L -O "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/ESPConnect-arm64.dmg"
          \`\`\`
          Open the DMG and drag ESPConnect to Applications. First launch: Right-click > Open to bypass Gatekeeper.

          **macOS Intel:**
          \`\`\`bash
          curl -L -O "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/ESPConnect-x64.dmg"
          \`\`\`
          Open the DMG and drag ESPConnect to Applications. First launch: Right-click > Open to bypass Gatekeeper.

          **Windows:**
          Download and run the \`.exe\` installer. Windows Defender may show a warning on first launch - click "More info" > "Run anyway".

          **Linux (Debian/Ubuntu):**
          \`\`\`bash
          sudo dpkg -i espconnect_${version}_amd64.deb
          \`\`\`

          **Linux (Fedora/RHEL):**
          \`\`\`bash
          sudo rpm -i espconnect-${version}.x86_64.rpm
          \`\`\`

          **Web UI (static files):**
          \`\`\`bash
          curl -L -o dist.zip "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/dist.zip"
          unzip dist.zip -d dist
          \`\`\`
          Serve the dist/ folder with any static file server.

          **USB Serial Permissions (Linux):**

          Add your user to the \`dialout\` group:
          \`\`\`bash
          sudo usermod -a -G dialout \$USER
          \`\`\`
          Then log out and back in.
          EOF
          } > "$release_notes"

          echo "path=$release_notes" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: ESPConnect ${{ github.ref_name }}
          body_path: ${{ steps.release_notes.outputs.path }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/dist/dist.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
